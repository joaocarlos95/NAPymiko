# YAML variables.yaml
hostname: 'rtr-001-ce01'
enable_secret: cisco
domain_name: cisco.com

vlans:
    1: Teste1
    2: Teste2


switchports:
  -
    interface: GigabitEthernet 0/1-10
    description: Users
    mode: access
    data_vlan: 20
    voice_vlan: 30
    state: no shutdown
  -
    interface:
      - GigabitEthernet 0/47-48
      - GigabitEthernet 0/50
    description: Uplink
    mode: trunk
    data_vlan:
      - 10-20
      - 30
      - 40
    state: shutdown






interfaces:
  -
    name: 'GigabitEthernet 0/1'
    description: 'WAN INTERFACE1'
    ip: 10.10.10.1
    mask: 255.255.255.0
    state: 'shutdown'
  -
    name: 'GigabitEthernet 0/2'
    description: 'WAN INTERFACE1'
    ip: 10.10.20.1
    mask: 255.255.255.0
    state: 'no shutdown'
  -
    name: 'GigabitEthernet 1/0'
    description: 'WAN INTERFACE1'
    ip: 10.10.30.1
    mask: 255.255.255.0
    state: 'no shutdown'

trunks:
  GigabitEthernet 0/1:
    action: add
    vlans:
      - 1
      - 2
      - 3
  GigabitEthernet 0/2:
    action: only
    vlans:
      - 4
      - 5
      - 6